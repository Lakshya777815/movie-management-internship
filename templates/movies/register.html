{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Sign Up - MovieApp Premium{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="glass-card p-5 border-0 shadow-lg position-relative overflow-hidden">
      <div class="position-absolute top-0 start-0 w-100 h-100" style="background: radial-gradient(circle at center, rgba(139, 92, 246, 0.08), transparent 70%); z-index: 0;"></div>
      <div class="position-relative z-1">
        <h2 class="text-white fw-bold mb-4 text-center"><i class="fas fa-user-plus me-2 text-primary"></i>Sign Up</h2>
        
        <form method="post" class="mt-4">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill mt-4">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
        </form>
        
        <div class="text-center mt-4">
          <p class="text-muted mb-0">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">Login here</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
