<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MovieApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .movie-card { transition: transform 0.2s; }
        .movie-card:hover { transform: scale(1.05); }
        .carousel-item img { object-fit: cover; height: 500px; width: 100%; }
        .verified-badge { color: #198754; font-size: 0.9em; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">MovieApp</a>
            <div class="ms-auto text-light">
                {% if user.is_authenticated %}
                    Welcome, {{ user.username }} | <a href="{% url 'admin:logout' %}?next=/" class="text-light text-decoration-none">Logout</a>
                {% else %}
                    <a href="{% url 'admin:login' %}?next=/" class="text-light text-decoration-none">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
